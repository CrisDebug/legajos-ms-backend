version: "3.9"

services:

  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-db
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: oracle
    volumes:
      - ./oracle-init:/container-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 30s
      retries: 20
      start_period: 60s

  casilleros-service:
    build:
      context: ../../proyecto-microservicio-casillero-backend/casilleros-service
    container_name: casilleros-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@oracle-db:1521/XEPDB1
      SPRING_DATASOURCE_USERNAME: USUARIO_CAS
      SPRING_DATASOURCE_PASSWORD: 1234
    depends_on:
      oracle-db:
        condition: service_healthy

  legajos-service:
    build:
      context: .
    container_name: legajos-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@oracle-db:1521/XEPDB1
      SPRING_DATASOURCE_USERNAME: USUARIO_LEG
      SPRING_DATASOURCE_PASSWORD: 1234
    depends_on:
      oracle-db:
        condition: service_healthy

  usuarios-service:
    build:
      context: ../../proyecto-microservicio-usuarios-backend/microservicio-usuarios-backend
    container_name: usuarios-service
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@oracle-db:1521/XEPDB1
      SPRING_DATASOURCE_USERNAME: APP_ADMIN
      SPRING_DATASOURCE_PASSWORD: 1234
    depends_on:
      oracle-db:
        condition: service_healthy